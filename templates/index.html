<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quran-style Background</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      /* Base gradient background (tweak colors as you like) */
      background:
        radial-gradient(circle at top left, #1f5f4a 0, transparent 55%),
        radial-gradient(circle at bottom right, #0f3b2c 0, transparent 55%),
        linear-gradient(135deg, #0b2b22, #123f32);
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* Optional: subtle geometric pattern overlay using a pseudo-element */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.12;
      background-image:
        linear-gradient(45deg, rgba(255,255,255,0.12) 1px, transparent 1px),
        linear-gradient(-45deg, rgba(255,255,255,0.12) 1px, transparent 1px);
      background-size: 40px 40px;
      mix-blend-mode: soft-light;
      z-index: -1;
    }

    .content {
      max-width: 800px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
      text-align: center;
    }

    .card {
      background: rgba(5, 20, 16, 0.7);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
    }

    p {
      line-height: 1.7;
      color: #d7f5e8;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="card">
      <h1>Quran-style Background</h1>
      <p>
        This is a demo of a deep green gradient background with a subtle pattern overlay,
        similar in feel to Quran.com.
      </p>
    </div>
  </div>
</body>
</html>
